<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="malee-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="25%" stop-color="#F9E076" />
      <stop offset="50%" stop-color="#B8860B" />
      <stop offset="75%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#996515" />
    </linearGradient>
    
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .calligraphy {
      fill: url(#malee-gold);
      filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.4));
    }
    .flourish {
      fill: none;
      stroke: url(#malee-gold);
      stroke-width: 2.5;
      stroke-linecap: round;
      opacity: 0.8;
    }
  </style>

  <path class="flourish" d="M150,180 Q100,120 200,100 T300,150" />
  <path class="flourish" d="M650,180 Q700,120 600,100 T500,150" />

  <g class="calligraphy">
    <path d="M180,150 C185,120 210,110 230,130 S210,180 190,170 Q170,160 180,120" />
    <path d="M205,115 Q215,90 235,115" /> <path d="M280,155 Q260,130 290,120 T320,150 Q310,180 285,175" />
    <path d="M290,185 Q305,210 325,190" /> <path d="M350,130 Q380,120 380,155 T350,180 Q330,160 350,135" />

    <path d="M430,175 V130 Q450,110 470,130 T470,175" />
    <path d="M490,130 Q510,110 530,130 V175" />
    <path d="M510,110 Q520,80 540,95" /> <path d="M570,130 Q600,120 600,155 T570,180 Q550,160 570,135" />
    <path d="M620,175 V135 Q640,115 660,135 T660,175" />
    <path d="M665,130 L680,110" /> </g>

  <path class="flourish" d="M250,220 Q400,250 550,220" stroke-width="1.5" />
  <circle cx="400" cy="238" r="3" fill="url(#malee-gold)" />
</svg>
